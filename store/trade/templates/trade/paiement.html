{% extends 'trade/base.html' %}

{% block content %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .payment-card {
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .payment-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .payment-icon {
            font-size: 2rem;
        }
        .selected {
            border: 2px solid #0d6efd;
        }
        .btn-pay {
            background-color: #0d6efd;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4">Choisissez votre mode de paiement</h2>
    
    <div class="row g-4 justify-content-center">

        <!-- Carte bancaire -->
        <div class="col-md-4">
            <div class="card payment-card text-center p-3" onclick="selectPayment(this)">
                <div class="payment-icon mb-2">💳</div>
                <h5 class="card-title">Carte bancaire</h5>
                <p class="card-text">Visa, MasterCard, American Express</p>
            </div>
        </div>

        <!-- PayPal -->
        <div class="col-md-4">
            <div class="card payment-card text-center p-3" onclick="selectPayment(this)">
                <div class="payment-icon mb-2">🅿️</div>
                <h5 class="card-title">PayPal</h5>
                <p class="card-text">Paiement sécurisé via PayPal</p>
            </div>
        </div>

        <!-- Mobile Money -->
        <div class="col-md-4">
            <div class="card payment-card text-center p-3" onclick="selectPayment(this)">
                <div class="payment-icon mb-2">📱</div>
                <h5 class="card-title">Mobile Money</h5>
                <p class="card-text">MTN, Orange, Digicel</p>
            </div>
        </div>

    </div>

    <!-- Formulaire paiement -->
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <form>
                <div class="mb-3">
                    <label for="name" class="form-label">Nom complet</label>
                    <input type="text" class="form-control rounded-pill" id="name" placeholder="Votre nom">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Adresse e-mail</label>
                    <input type="email" class="form-control rounded-pill" id="email" placeholder="exemple@mail.com">
                </div>
                <div class="mb-3">
                    <label for="amount" class="form-label">Montant</label>
                    <input type="number" class="form-control rounded-pill" id="amount" placeholder="0.00">
                </div>
                <button type="submit" class="btn btn-pay w-100 py-2 rounded-pill mt-3">Payer maintenant</button>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</script> -->
</body>
</html>
{% endblock %}
