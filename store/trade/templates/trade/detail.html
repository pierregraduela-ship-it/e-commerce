{% extends 'trade/base.html' %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>


    /* Effet sur les images */
    .card-img-top {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .card-img-top:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    
    /* Card hover */
    .card:hover {
        transform: translateY(-5px);
        transition: transform 0.3s ease;
    }

   
    
    /* Card hover */
    .col-12:hover {
        transform: translateY(-5px);
        transition: transform 0.3s ease;
    }
    </style>

<div class="container mt-4">
    <form method="GET" action="{% url 'search' %}" class="d-flex mb-4">
        <input class="form-control me-2" type="search" name="q" placeholder="Rechercher produit ou catégorie">
        <button class="btn btn-outline-success"><i class="bi bi-search"></i></button>
    </form>

    

<div class="row g-4">

    <!-- Image produit -->
    <div class="col-12 col-md-6 text-center">
        <img src="{{ product.image.url }}" class="img-fluid rounded shadow-sm" style="max-height:400px; object-fit:cover;">
    </div>

    <!-- Infos produit -->
    <div class="col-12 col-md-6">
        <h2>{{ product.name }}</h2>
        <p class="text-muted">{{ product.description }}</p>
        <h3 class="text-success fw-bold">{{ product.price }} $</h3>

        <a href="{% url 'add_to_cart' product.id %}" class="btn btn-success btn-lg mt-3">
            <i class="bi bi-cart-plus-fill"></i>
        </a>
    </div>

</div>

<hr class="my-5">

<h3 class="mb-4">Produits similaires</h3>

<div class="row g-4">
{% for p in related_products %}
<div class="col-12 col-sm-6 col-md-4 col-lg-3">
    <div class="card h-100 shadow-sm">
        <a href="{% url 'detail' p.id %}">
            <img src="{{ p.image.url }}" class="card-img-top img-fluid" style="height:200px; object-fit:cover;">
        </a>
        <div class="card-body d-flex flex-column">
            <h6 class="card-title">{{ p.name }}</h6>
            <p class="card-text text-success fw-bold">{{ p.price }} $</p>
            <a href="{% url 'add_to_cart' p.id %}" class="btn btn-success mt-auto">
                <i class="bi bi-cart-plus-fill"></i>
            </a>
        </div>
    </div>
</div>
{% endfor %}
</div>

</div>

{% endblock %}
