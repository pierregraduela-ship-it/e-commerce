{% extends 'trade/base.html' %}
{% block content %}

<div class="container-fluid bg-light" style="min-height:90vh;">

```
<div class="row justify-content-center align-items-center py-5">

    <div class="col-lg-4 col-md-6 col-sm-10">

        <div class="card shadow-lg border-0">

            <div class="card-body p-5">

                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">Connexion</h3>
                    <p class="text-muted">
                        Accédez à votre espace client
                    </p>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold">
                            Nom d'utilisateur
                        </label>
                        <input 
                            type="text"
                            name="username"
                            id="id_username"
                            class="form-control"
                            placeholder="Entrez votre nom d'utilisateur"
                        >
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-semibold">
                            Mot de passe
                        </label>
                        <input 
                            type="password"
                            name="password"
                            id="id_password"
                            class="form-control"
                            placeholder="Entrez votre mot de passe"
                        >
                    </div>

                    {% if form.errors %}
                    <div class="alert alert-danger py-2 text-center">
                        Nom d'utilisateur ou mot de passe incorrect
                    </div>
                    {% endif %}

                    <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                        Se connecter
                    </button>

                </form>

                <div class="text-center mt-4">

                    <a href="#" class="text-decoration-none text-muted small">
                        Mot de passe oublié ?
                    </a>

                    <p class="mt-3 small">
                        Pas encore de compte ?
                        <a href="{% url 'signup' %}" class="text-success fw-semibold text-decoration-none">
                            Créer un compte
                        </a>
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>
```

</div>

{% endblock %}
