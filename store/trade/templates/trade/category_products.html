{% extends 'trade/base.html' %}

{% block content %}

<div class="container py-4">

    <!-- Titre Catégorie -->
    <div class="text-center mb-5">
        <h2 class="fw-bold">{{ category.name }}</h2>
        <p class="text-muted">Découvrez nos produits disponibles</p>
        <hr class="w-25 mx-auto">
    </div>

    <!-- Grille Produits -->
    <div class="row g-4">

        {% for product in products %}
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">

            <div class="card h-100 border-0 shadow-sm product-card">

                <!-- Image -->
                <div class="overflow-hidden">
                    <a href="{% url 'detail' product.id %}">
                        <img src="{{ product.image.url }}"
                             class="card-img-top product-img">
                    </a>
                </div>

                <!-- Infos -->
                <div class="card-body d-flex flex-column">

                    <h6 class="fw-semibold text-truncate">
                        {{ product.name }}
                    </h6>

                    <p class="text-success fw-bold fs-5 mb-3">
                        {{ product.price }} $
                    </p>

                    <a href="{% url 'add_to_cart' product.id %}"
                       class="btn btn-success mt-auto rounded-pill">
                       <i class="bi bi-cart-plus-fill"></i> Ajouter au panier
                    </a>

                </div>
            </div>

        </div>
        {% endfor %}

    </div>

</div>

<!-- Styles Design -->
<style>
.product-card{
    transition: all 0.3s ease;
    border-radius: 15px;
}
.product-card:hover{
    transform: translateY(-6px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.15);
}
.product-img{
    height: 220px;
    object-fit: cover;
    transition: transform 0.4s ease;
}
.product-card:hover .product-img{
    transform: scale(1.08);
}
</style>

{% endblock %}
