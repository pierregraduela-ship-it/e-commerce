{% extends 'trade/base.html' %}
{% block content %}

<div class="container mt-4">
    <h3 class="mb-4"><i class="bi bi-folder-fill"></i> Gestion des catégories</h3>

    <div class="row">
        <!-- Formulaire -->
        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5><i class="bi bi-plus-square"></i> Ajouter une catégorie</h5>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100"><i class="bi bi-plus-square"></i></button>
                </form>
            </div>
        </div>

        <!-- Liste -->
        <div class="col-md-8">
            <div class="card p-3 shadow-sm">
                <h5> Liste des catégories</h5>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Nom</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for cat in categories %}
                        <tr>
                            <td>{{ cat.name }}</td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td>Aucune catégorie</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <a href="{% url 'main_dashboard' %}" class="btn btn-secondary mt-3"><i class="bi bi-arrow-bar-left"></i> Retour</a>
</div>

{% endblock %}
