{% extends 'trade/base.html' %}

{% block content %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">


<style>


    /* Effet sur les images */
    .card-img-top {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .card-img-top:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    
    /* Card hover */
    .card:hover {
        transform: translateY(-5px);
        transition: transform 0.3s ease;
    }
    </style>

<div class="container mt-4">
    <form method="GET" action="{% url 'search' %}" class="d-flex mb-4">
        <input class="form-control me-2" type="search" name="q" placeholder="Rechercher produit ou catégorie">
        <button class="btn btn-outline-success"><i class="bi bi-search"></i></button>
    </form>

<h2 class="mb-4">Résultats pour "{{ query }}"</h2>

<div class="row g-4">
{% for product in products %}
<div class="col-12 col-sm-6 col-md-4 col-lg-3">
    <div class="card h-100 shadow-sm">
        <a href="{% url 'detail' product.id %}">
            <img src="{{ product.image.url }}" class="card-img-top img-fluid" style="height:220px; object-fit:cover;">
        </a>
        <div class="card-body d-flex flex-column">
            <h6 class="card-title">{{ product.name }}</h6>
            <p class="card-text fw-bold text-success">{{ product.price }} $</p>
            <a href="{% url 'add_to_cart' product.id %}" class="btn btn-success mt-auto">
                <i class="bi bi-cart-plus-fill"></i> Ajouter au panier
            </a>
        </div>
    </div>
</div>
{% empty %}
<div class="col-12">
    <div class="alert alert-warning text-center">
        Aucun produit trouvé.
    </div>
</div>
{% endfor %}
</div>

</div>

{% endblock %}
